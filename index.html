<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Extemporaneous Prep &amp; Label Unit</title>

<!-- Tailwind (JIT, runs entirely in the browser — no build step) -->
<script src="https://cdn.tailwindcss.com/3.4.16"></script>

<!-- React + ReactDOM (UMD builds, no bundler needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- Babel standalone: lets the browser understand JSX directly -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- PapaParse: reads the CSV file -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .input {
    width: 100%;
    border: 1px solid #DEDACE;
    border-radius: 0.375rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.875rem;
    background: #FAF9F5;
  }
  .input:focus { outline: none; box-shadow: 0 0 0 2px #0B4F4A; }

  @media print {
    body * { visibility: hidden; }
    #print-label, #print-label * { visibility: visible; }
    #print-label { position: fixed; top: 0; left: 0; margin: 0; }
    @page { margin: 6mm; }
  }
</style>
</head>
<body class="bg-[#F3F1EA]">
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useMemo } = React;

// Path to the CSV file living in the same GitHub repo as this page.
// Keep it as "./drug_database.csv" if the CSV sits in the same folder as index.html.
const CSV_URL = "./drug_database.csv";

/* ---------- tiny inline icons (no external icon package needed) ---------- */
function IconFlask(props) {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
         strokeLinecap="round" strokeLinejoin="round" {...props}>
      <path d="M9 2v6.5L4 18a2 2 0 0 0 1.8 3h12.4a2 2 0 0 0 1.8-3l-5-9.5V2" />
      <path d="M8 2h8" />
      <path d="M7 16h10" />
    </svg>
  );
}
function IconSearch(props) {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
         strokeLinecap="round" strokeLinejoin="round" {...props}>
      <circle cx="11" cy="11" r="7" />
      <path d="m21 21-4.3-4.3" />
    </svg>
  );
}
function IconPrinter(props) {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
         strokeLinecap="round" strokeLinejoin="round" {...props}>
      <polyline points="6 9 6 2 18 2 18 9" />
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
      <rect x="6" y="14" width="12" height="8" />
    </svg>
  );
}
function IconHistory(props) {
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
         strokeLinecap="round" strokeLinejoin="round" {...props}>
      <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
      <path d="M3 3v5h5" />
      <path d="M12 7v5l4 2" />
    </svg>
  );
}

/* ---------------------------- helpers ---------------------------- */
function uid() { return Math.random().toString(36).slice(2, 9); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function addDays(dateStr, days) {
  if (!dateStr || days === "" || days === null || isNaN(Number(days))) return "";
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + Number(days));
  return d.toISOString().slice(0, 10);
}
function formatDisplayDate(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((d - now) / 86400000);
}
function genBatch() {
  const d = new Date();
  const ymd = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
  const suffix = Math.random().toString(36).slice(2, 5).toUpperCase();
  return `EXT-${ymd}-${suffix}`;
}

const FORM_OPTIONS = [
  "Oral Suspension", "Ointment", "Cream", "Oral Solution",
  "Topical Solution", "Powder Papers", "Capsule (compounded)", "Enema", "Other",
];

/* ---------------------------- app ---------------------------- */
function App() {
  const [drugs, setDrugs] = useState([]);
  const [history, setHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [loadError, setLoadError] = useState("");
  const [tab, setTab] = useState("label");
  const [search, setSearch] = useState("");
  const [selectedId, setSelectedId] = useState("");
  const [toast, setToast] = useState("");

  const [facility, setFacility] = useState("Extemporaneous Preparation Unit");
  const [form, setForm] = useState({
    drugName: "", concentration: "", newForm: "", volume: "", volumeUnit: "mL",
    datePrepared: todayISO(), expiryMode: "auto", expiryDate: "", beyondUseDays: "",
    batch: genBatch(), preparedBy: "", storageInstructions: "", notes: "",
  });
  const [copies, setCopies] = useState(1);

  useEffect(() => {
    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        const normalized = results.data.map((r) => {
          const lower = {};
          Object.keys(r).forEach((k) => (lower[k.trim().toLowerCase()] = r[k]));
          const name = (lower.name || lower.drug_name || lower.drug || "").trim();
          if (!name) return null;
          return {
            id: uid(),
            name,
            concentration: (lower.concentration || lower.strength || "").trim(),
            form: (lower.form || lower.dosage_form || "").trim(),
            beyond_use_days: (lower.beyond_use_days || lower.bud || lower.expiry_days)
              ? Number(lower.beyond_use_days || lower.bud || lower.expiry_days) : "",
            storage_instructions: (lower.storage_instructions || lower.storage || lower.notes || "").trim(),
          };
        }).filter(Boolean);
        setDrugs(normalized);
        setLoaded(true);
      },
      error: () => {
        setLoadError("Couldn't load drug_database.csv from the repo. Check the file exists next to index.html.");
        setLoaded(true);
      },
    });
  }, []);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2600); }

  const filteredDrugs = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return drugs;
    return drugs.filter((d) => d.name.toLowerCase().includes(q));
  }, [drugs, search]);

  function selectDrug(id) {
    const d = drugs.find((x) => x.id === id);
    setSelectedId(id);
    if (!d) return;
    setForm((f) => ({
      ...f,
      drugName: d.name,
      concentration: d.concentration || "",
      newForm: d.form || "",
      beyondUseDays: d.beyond_use_days ?? "",
      storageInstructions: d.storage_instructions || "",
      expiryMode: "auto",
      expiryDate: addDays(f.datePrepared, d.beyond_use_days),
    }));
  }

  function updateForm(patch) {
    setForm((f) => {
      const next = { ...f, ...patch };
      if (next.expiryMode === "auto") next.expiryDate = addDays(next.datePrepared, next.beyondUseDays);
      return next;
    });
  }

  const isValid = form.drugName.trim() && form.concentration.trim() && form.newForm.trim()
    && form.volume.toString().trim() && form.datePrepared && form.expiryDate;

  function handlePrint() {
    if (!isValid) { showToast("Fill in drug, concentration, form, volume, and dates first."); return; }
    const entry = { ...form, id: uid(), printedAt: new Date().toISOString(), facility };
    setHistory([entry, ...history].slice(0, 100));
    window.print();
  }

  function reprint(entry) {
    setForm({
      drugName: entry.drugName, concentration: entry.concentration, newForm: entry.newForm,
      volume: entry.volume, volumeUnit: entry.volumeUnit, datePrepared: entry.datePrepared,
      expiryMode: "manual", expiryDate: entry.expiryDate, beyondUseDays: entry.beyondUseDays,
      batch: entry.batch, preparedBy: entry.preparedBy,
      storageInstructions: entry.storageInstructions, notes: entry.notes,
    });
    setTab("label");
    showToast("Loaded into the label form — review and print.");
  }

  const expDays = daysUntil(form.expiryDate);
  const expiryTone = expDays === null ? "neutral" : expDays < 0 ? "expired" : expDays <= 3 ? "soon" : "ok";

  if (!loaded) {
    return <div className="min-h-screen flex items-center justify-center text-stone-500 mono text-sm">loading drug database…</div>;
  }

  return (
    <div className="min-h-screen bg-[#F3F1EA]">
      <div className="max-w-6xl mx-auto px-4 py-6 sm:px-6">
        <header className="flex items-center justify-between gap-4 mb-6 flex-wrap">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-md bg-[#0B4F4A] flex items-center justify-center shrink-0">
              <IconFlask className="w-5 h-5 text-[#E8F3F1]" />
            </div>
            <div>
              <h1 className="text-lg font-semibold text-[#1B2422] leading-tight">Extemporaneous Prep &amp; Label Unit</h1>
              <input value={facility} onChange={(e) => setFacility(e.target.value)}
                className="text-xs text-[#5B6664] bg-transparent border-none outline-none focus:underline w-full"
                aria-label="Facility name" />
            </div>
          </div>
          <nav className="flex gap-1 bg-white rounded-lg p-1 border border-[#DEDACE]">
            {[{ key: "label", label: "New Label" }, { key: "database", label: "Drug List" }, { key: "history", label: "History" }].map((t) => (
              <button key={t.key} onClick={() => setTab(t.key)}
                className={`px-3 py-1.5 text-sm rounded-md transition-colors ${tab === t.key ? "bg-[#0B4F4A] text-white" : "text-[#3E4745] hover:bg-[#F3F1EA]"}`}>
                {t.label}
              </button>
            ))}
          </nav>
        </header>

        {toast && <div className="mb-4 px-4 py-2 rounded-md bg-[#1B2422] text-white text-sm inline-block">{toast}</div>}

        {tab === "database" && (
          <DatabaseTab drugs={drugs} search={search} setSearch={setSearch} filteredDrugs={filteredDrugs} loadError={loadError} />
        )}

        {tab === "history" && <HistoryTab history={history} onReprint={reprint} />}

        {tab === "label" && (
          <div className="grid lg:grid-cols-5 gap-6">
            <div className="lg:col-span-3 space-y-4">
              <section className="bg-white rounded-xl border border-[#DEDACE] p-5">
                <h2 className="text-sm font-semibold text-[#1B2422] mb-3 flex items-center gap-2">
                  <IconSearch className="w-4 h-4 text-[#0B4F4A]" /> Select drug from database
                </h2>
                <select value={selectedId} onChange={(e) => selectDrug(e.target.value)}
                  className="w-full border border-[#DEDACE] rounded-md px-3 py-2 text-sm bg-[#FAF9F5] focus:outline-none focus:ring-2 focus:ring-[#0B4F4A]">
                  <option value="">— choose a drug —</option>
                  {drugs.map((d) => <option key={d.id} value={d.id}>{d.name} ({d.concentration})</option>)}
                </select>
                <p className="text-xs text-[#8A8478] mt-2">Selecting a drug fills concentration, beyond-use days, and storage notes below. Every field stays editable.</p>
              </section>

              <section className="bg-white rounded-xl border border-[#DEDACE] p-5 space-y-4">
                <h2 className="text-sm font-semibold text-[#1B2422]">Preparation details</h2>

                <Field label="Drug name">
                  <input value={form.drugName} onChange={(e) => updateForm({ drugName: e.target.value })} className="input" placeholder="e.g. Omeprazole" />
                </Field>

                <div className="grid grid-cols-2 gap-3">
                  <Field label="Prepared concentration">
                    <input value={form.concentration} onChange={(e) => updateForm({ concentration: e.target.value })} className="input mono" placeholder="2 mg/mL" />
                  </Field>
                  <Field label="New dosage form">
                    <select value={form.newForm} onChange={(e) => updateForm({ newForm: e.target.value })} className="input">
                      <option value="">select…</option>
                      {FORM_OPTIONS.map((o) => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </Field>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <Field label="Volume / quantity">
                    <input value={form.volume} onChange={(e) => updateForm({ volume: e.target.value })} className="input mono" placeholder="100" inputMode="decimal" />
                  </Field>
                  <Field label="Unit">
                    <select value={form.volumeUnit} onChange={(e) => updateForm({ volumeUnit: e.target.value })} className="input">
                      {["mL", "g", "L", "units"].map((u) => <option key={u} value={u}>{u}</option>)}
                    </select>
                  </Field>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <Field label="Date prepared">
                    <input type="date" value={form.datePrepared} onChange={(e) => updateForm({ datePrepared: e.target.value })} className="input mono" />
                  </Field>
                  <Field label="Beyond-use days">
                    <input value={form.beyondUseDays} onChange={(e) => updateForm({ beyondUseDays: e.target.value })} className="input mono" placeholder="14" inputMode="numeric" />
                  </Field>
                </div>

                <div className="flex items-center gap-4">
                  <label className="flex items-center gap-2 text-xs text-[#5B6664]">
                    <input type="radio" checked={form.expiryMode === "auto"}
                      onChange={() => updateForm({ expiryMode: "auto", expiryDate: addDays(form.datePrepared, form.beyondUseDays) })} />
                    Auto-calc expiry
                  </label>
                  <label className="flex items-center gap-2 text-xs text-[#5B6664]">
                    <input type="radio" checked={form.expiryMode === "manual"} onChange={() => updateForm({ expiryMode: "manual" })} />
                    Set manually
                  </label>
                </div>

                <Field label="Expiry date">
                  <input type="date" disabled={form.expiryMode === "auto"} value={form.expiryDate}
                    onChange={(e) => updateForm({ expiryDate: e.target.value })}
                    className="input mono disabled:bg-[#F3F1EA] disabled:text-[#8A8478]" />
                </Field>

                <div className="grid grid-cols-2 gap-3">
                  <Field label="Batch / lot number">
                    <div className="flex gap-2">
                      <input value={form.batch} onChange={(e) => updateForm({ batch: e.target.value })} className="input mono" />
                      <button onClick={() => updateForm({ batch: genBatch() })} type="button"
                        className="px-3 rounded-md border border-[#DEDACE] text-xs text-[#3E4745] hover:bg-[#F3F1EA]" title="Generate new batch number">↻</button>
                    </div>
                  </Field>
                  <Field label="Prepared by">
                    <input value={form.preparedBy} onChange={(e) => updateForm({ preparedBy: e.target.value })} className="input" placeholder="Pharmacist name" />
                  </Field>
                </div>

                <Field label="Storage instructions">
                  <textarea value={form.storageInstructions} onChange={(e) => updateForm({ storageInstructions: e.target.value })} className="input resize-none" rows="2" />
                </Field>

                <Field label="Additional notes (optional)">
                  <input value={form.notes} onChange={(e) => updateForm({ notes: e.target.value })} className="input" placeholder="e.g. Shake well before use" />
                </Field>
              </section>
            </div>

            <div className="lg:col-span-2 space-y-4">
              <div className="sticky top-6 space-y-4">
                <Label facility={facility} form={form} expiryTone={expiryTone} expDays={expDays} />
                <section className="bg-white rounded-xl border border-[#DEDACE] p-4 space-y-3">
                  <div className="flex items-center justify-between">
                    <label className="text-xs text-[#5B6664]">Copies to print</label>
                    <input type="number" min="1" max="12" value={copies}
                      onChange={(e) => setCopies(Math.max(1, Number(e.target.value) || 1))}
                      className="w-16 border border-[#DEDACE] rounded-md px-2 py-1 text-sm mono text-center" />
                  </div>
                  <button onClick={handlePrint}
                    className="w-full flex items-center justify-center gap-2 bg-[#0B4F4A] hover:bg-[#093F3B] text-white rounded-md py-2.5 text-sm font-medium transition-colors">
                    <IconPrinter className="w-4 h-4" /> Print label
                  </button>
                  {!isValid && <p className="text-xs text-[#B8752E]">Fill in drug name, concentration, form, volume, and dates to enable printing.</p>}
                </section>
              </div>
            </div>
          </div>
        )}
      </div>

      <div id="print-label" className="hidden print:block">
        <div className="flex flex-wrap gap-3">
          {Array.from({ length: copies }).map((_, i) => <PrintLabelCard key={i} facility={facility} form={form} />)}
        </div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block text-xs font-medium text-[#5B6664] mb-1">{label}</span>
      {children}
    </label>
  );
}

function DatabaseTab({ drugs, search, setSearch, filteredDrugs, loadError }) {
  return (
    <div className="space-y-4">
      <section className="bg-white rounded-xl border border-[#DEDACE] p-5">
        <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
          <div>
            <h2 className="text-sm font-semibold text-[#1B2422]">Drug list</h2>
            <p className="text-xs text-[#8A8478] mt-0.5">{drugs.length} drug{drugs.length !== 1 ? "s" : ""} loaded from <span className="mono">drug_database.csv</span></p>
          </div>
        </div>
        {loadError && <div className="mb-3 px-3 py-2 rounded-md bg-[#FBEAEA] text-[#B33A3A] text-xs">{loadError}</div>}
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search drug name…" className="w-full border border-[#DEDACE] rounded-md px-3 py-2 text-sm bg-[#FAF9F5] mb-3" />
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-xs text-[#8A8478] border-b border-[#DEDACE]">
                <th className="pb-2 pr-3">Name</th><th className="pb-2 pr-3">Concentration</th>
                <th className="pb-2 pr-3">Form</th><th className="pb-2 pr-3">BUD (days)</th><th className="pb-2 pr-3">Storage</th>
              </tr>
            </thead>
            <tbody>
              {filteredDrugs.map((d) => (
                <tr key={d.id} className="border-b border-[#F0EDE4]">
                  <td className="py-2 pr-3 font-medium text-[#1B2422]">{d.name}</td>
                  <td className="py-2 pr-3 mono text-[#3E4745]">{d.concentration}</td>
                  <td className="py-2 pr-3 text-[#3E4745]">{d.form}</td>
                  <td className="py-2 pr-3 mono text-[#3E4745]">{d.beyond_use_days || "—"}</td>
                  <td className="py-2 pr-3 text-[#8A8478] max-w-xs truncate">{d.storage_instructions}</td>
                </tr>
              ))}
              {filteredDrugs.length === 0 && (
                <tr><td colSpan="5" className="py-6 text-center text-[#8A8478] text-sm">No drugs match your search.</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </section>
      <section className="bg-[#0B4F4A]/5 border border-[#0B4F4A]/20 rounded-xl p-4 text-xs text-[#3E4745] leading-relaxed">
        <strong className="text-[#0B4F4A]">To edit this list:</strong> update <span className="mono">drug_database.csv</span> in the GitHub repo
        (columns: <span className="mono">name, concentration, form, beyond_use_days, storage_instructions</span>) and commit — the page reloads it automatically.
      </section>
    </div>
  );
}

function HistoryTab({ history, onReprint }) {
  return (
    <section className="bg-white rounded-xl border border-[#DEDACE] p-5">
      <h2 className="text-sm font-semibold text-[#1B2422] mb-1 flex items-center gap-2">
        <IconHistory className="w-4 h-4 text-[#0B4F4A]" /> Printed labels
      </h2>
      <p className="text-xs text-[#8A8478] mb-4">Last {history.length} labels printed this session.</p>
      <div className="space-y-2">
        {history.length === 0 && <p className="text-sm text-[#8A8478]">No labels printed yet.</p>}
        {history.map((h) => (
          <div key={h.id} className="flex items-center justify-between border border-[#F0EDE4] rounded-lg px-4 py-2.5">
            <div>
              <p className="text-sm font-medium text-[#1B2422]">{h.drugName} <span className="mono text-[#8A8478] font-normal">· {h.batch}</span></p>
              <p className="text-xs text-[#8A8478]">{h.newForm} · {h.volume}{h.volumeUnit} · prepared {formatDisplayDate(h.datePrepared)} · expires {formatDisplayDate(h.expiryDate)}</p>
            </div>
            <button onClick={() => onReprint(h)} className="text-xs px-3 py-1.5 rounded-md border border-[#DEDACE] text-[#3E4745] hover:bg-[#F3F1EA] flex items-center gap-1.5 shrink-0">
              <IconPrinter className="w-3 h-3" /> Reprint
            </button>
          </div>
        ))}
      </div>
    </section>
  );
}

function LabelBody({ facility, form }) {
  return (
    <div className="bg-white text-[#14201E] relative overflow-hidden"
      style={{ width: "3in", height: "2in", border: "1.5px solid #14201E", borderRadius: "4px", padding: "0.14in 0.16in" }}>
      <div className="absolute inset-y-0 left-0" style={{ width: "4px", background: "#0B4F4A" }} />
      <div className="flex items-start justify-between pl-1">
        <span style={{ fontSize: "6.5pt", letterSpacing: "0.05em" }} className="uppercase text-[#5B6664] font-medium">{facility || "Extemporaneous Preparation Unit"}</span>
        <span className="mono" style={{ fontSize: "6.5pt", color: "#8A8478" }}>{form.batch}</span>
      </div>
      <div className="pl-1 mt-1">
        <p style={{ fontSize: "13pt", fontWeight: 700, lineHeight: 1.1 }}>{form.drugName || "Drug name"}</p>
        <p className="mono" style={{ fontSize: "9.5pt", color: "#1B2422", marginTop: "1px" }}>{form.concentration || "concentration"}</p>
        <p style={{ fontSize: "8pt", color: "#3E4745" }}>{form.newForm || "dosage form"} · {form.volume || "—"}{form.volumeUnit}</p>
      </div>
      <div className="pl-1 mt-1.5 grid grid-cols-2 gap-x-2" style={{ fontSize: "7.3pt", color: "#1B2422" }}>
        <div><span className="text-[#8A8478]">Prepared</span><p className="mono font-medium">{formatDisplayDate(form.datePrepared)}</p></div>
        <div><span className="text-[#8A8478]">Expires</span><p className="mono font-medium">{formatDisplayDate(form.expiryDate)}</p></div>
      </div>
      {form.storageInstructions && <p className="pl-1 mt-1" style={{ fontSize: "6.8pt", color: "#3E4745", lineHeight: 1.25 }}>{form.storageInstructions}</p>}
      {form.notes && <p className="pl-1" style={{ fontSize: "6.8pt", fontStyle: "italic", color: "#B8752E" }}>{form.notes}</p>}
      <div className="absolute bottom-1.5 left-0 right-0 flex items-center justify-between pl-1 pr-2">
        <span style={{ fontSize: "6.3pt", color: "#8A8478" }}>{form.preparedBy ? `Prepared by ${form.preparedBy}` : ""}</span>
        <div className="flex" style={{ gap: "1.2px" }}>
          {Array.from({ length: 18 }).map((_, i) => (
            <div key={i} style={{ width: "1.3px", height: i % 3 === 0 ? "10px" : "7px", background: "#14201E" }} />
          ))}
        </div>
      </div>
    </div>
  );
}

function Label({ facility, form, expiryTone, expDays }) {
  const toneMap = {
    ok: { bg: "#EAF3EE", text: "#1E6B45", label: "Valid" },
    soon: { bg: "#FBF0DF", text: "#B8752E", label: "Expiring soon" },
    expired: { bg: "#FBEAEA", text: "#B33A3A", label: "Expired" },
    neutral: { bg: "#F0EDE4", text: "#8A8478", label: "Set dates" },
  };
  const tone = toneMap[expiryTone];
  return (
    <section className="bg-white rounded-xl border border-[#DEDACE] p-5">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-sm font-semibold text-[#1B2422]">Label preview</h2>
        <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{ background: tone.bg, color: tone.text }}>
          {tone.label}{expDays !== null && expiryTone !== "neutral" ? ` · ${expDays}d` : ""}
        </span>
      </div>
      <div className="flex justify-center bg-[#F3F1EA] rounded-lg py-6">
        <LabelBody facility={facility} form={form} />
      </div>
      <p className="text-xs text-[#8A8478] mt-3 text-center">Actual print size: 3in × 2in</p>
    </section>
  );
}

function PrintLabelCard({ facility, form }) {
  return <LabelBody facility={facility} form={form} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
